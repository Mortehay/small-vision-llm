networks:
  local-ai-net: {}
  shared-ai-network:
    external: true
services:
  ollama-llm:
    image: ollama/ollama:latest
    container_name: ollama-llm
    environment:
      - OLLAMA_VULKAN=1
      - HF_TOKEN=${HF_TOKEN}
    privileged: true
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card1
    security_opt:
      - seccomp=unconfined
    group_add:
      - "${RENDER_GID:-992}"
      - "${VIDEO_GID:-44}"
    networks:
      shared-ai-network:
        aliases:
          - ollama.loc
      local-ai-net:
        aliases:
          - ollama.loc
    deploy:
      resources:
        limits:
          memory: 8G  # Adjust based on your physical RAM
        reservations:
          memory: 4G

    ports:
      - "11435:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

  # --- Automated Model Downloader ---
  ollama-llm-pull-models:
    image: ollama/ollama:latest
    container_name: ollama-setup
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
      - HF_TOKEN=${HF_TOKEN}
    entrypoint: /bin/sh
    command: >
      -c "sleep 10;
      for model in ${LLM_LIST}; do
        if ! ollama list | grep -q \"$$model\"; then
          echo \"Model $$model not found, pulling...\";
          ollama pull $$model;
        else
          echo \"Model $$model already exists. Skipping.\";
        fi;
      done"
    depends_on:
      - ollama-llm
    restart: on-failure

  
  # --- Web Interface ---
  open-webui-llm:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui-llm
    ports:
      - "11090:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./webui_data:/app/backend/data
    restart: unless-stopped
    
  # --- Camera Streamer ---
  stream-cam:
    container_name: stream-cam
    # Use an image with python and ffmpeg, or build your own
    image: python:3.12-slim
    user: root
    privileged: true 
    networks:
      - local-ai-net
      - shared-ai-network
    ports:
      - "5000:5000"
    volumes:
      - /dev:/dev
      - ./scripts:/app
      - ./scripts/camera_control.py:/app/camera_control.py
    devices:
      - /dev/video0:/dev/video0
    deploy:
      resources:
        limits:
          memory: 8G
    environment:
      - FRAME_RESOLUTION=${FRAME_RESOLUTION}
      - CAMERA_URL=${CAMERA_URL}
    working_dir: /app
    entrypoint: >
      sh -c "apt-get update && apt-get install -y ffmpeg procps && 
             pip install flask flask-cors flask-socketio && 
             python camera_control.py"

  stream-operations:
    build:
      context: .
      dockerfile: ./configs/stream-operations/Dockerfile 
    container_name: stream_operations
    user: root
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - local-ai-net
      - shared-ai-network
    ports:
      - "5001:5001"
      - "5173:5173"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - PYTHONUNBUFFERED=1
      - CAMERA_URL=${CAMERA_URL}
      - OLLAMA_API_URL=${OLLAMA_API_URL}
    volumes:
      - /dev:/dev
      - ./scripts:/app/scripts
      - ./frontend:/app/frontend
      - ./logs:/app/logs
      - ./images:/app/images

